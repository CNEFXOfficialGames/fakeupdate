<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Update</title>

<style>
  body {
    margin: 0;
    background: #0b57d0;
    font-family: "Segoe UI", Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
  }

  h1 {
    font-weight: 400;
    font-size: 28px;
  }

  p {
    font-size: 18px;
    opacity: 0.9;
  }

  .spinner {
    margin: 40px auto;
    width: 80px;
    height: 80px;
    border: 8px solid rgba(255,255,255,0.2);
    border-top: 8px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .bar {
    width: 60%;
    height: 10px;
    background: rgba(255,255,255,0.2);
    margin: 30px auto;
    border-radius: 5px;
    overflow: hidden;
  }

  .progress {
    height: 100%;
    width: 0%;
    background: white;
    animation: load 15s infinite;
  }

  @keyframes load {
    0% { width: 0%; }
    50% { width: 70%; }
    80% { width: 90%; }
    100% { width: 95%; }
  }

  .small {
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="center">
  <h1>Working on updates</h1>
  <p>Don’t turn off your PC. This might take a while.</p>

  <div class="spinner"></div>

  <div class="bar">
    <div class="progress"></div>
  </div>

  <p class="small">Installing updates... 93%</p>
</div>

</body>
</html>
