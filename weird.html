<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CONTROL ROOM</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #05070d;
    color: #d0e7ff;
    overflow: hidden;
  }

  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    height: 100vh;
  }

  .panel {
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px;
    position: relative;
  }

  .title {
    font-size: 14px;
    opacity: 0.6;
  }

  #center {
    text-align: center;
    font-size: 28px;
    margin-top: 40%;
    transition: 0.3s;
  }

  .bar {
    height: 10px;
    width: 100%;
    background: rgba(255,255,255,0.1);
    margin-top: 10px;
    border-radius: 5px;
    overflow: hidden;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: #4dd0ff;
    transition: 0.3s;
  }

  .dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4dd0ff;
    animation: move 3s infinite alternate;
  }

  @keyframes move {
    0% { transform: translate(0,0); }
    100% { transform: translate(200px,150px); }
  }
</style>
</head>

<body>

<div id="grid">

  <div class="panel">
    <div class="title">SYSTEM CORE</div>
    <div id="center">ONLINE</div>
  </div>

  <div class="panel">
    <div class="title">ENERGY FLOW</div>
    <div class="bar"><div class="fill" id="energy"></div></div>
  </div>

  <div class="panel">
    <div class="title">ANOMALY FIELD</div>
    <div id="anomaly">0%</div>
  </div>

</div>

<script>
let energy = 0;
let anomaly = 0;

function tick() {
  // energy fluctuates
  energy = Math.random() * 100;
  document.getElementById("energy").style.width = energy + "%";

  // anomaly slowly rises
  anomaly += Math.random() * 5;
  if (anomaly > 100) anomaly = 0;

  document.getElementById("anomaly").innerText =
    Math.floor(anomaly) + "%";

  // center status changes
  const states = ["ONLINE", "STABLE", "DEGRADED", "SHIFTING"];
  document.getElementById("center").innerText =
    states[Math.floor(Math.random() * states.length)];

  // background subtle pulse
  document.body.style.background =
    `rgb(${5 + Math.random()*10},0,${20 + Math.random()*30})`;
}

setInterval(tick, 800);

// floating dots (alive feel)
setInterval(() => {
  const d = document.createElement("div");
  d.className = "dot";
  d.style.left = Math.random() * window.innerWidth + "px";
  d.style.top = Math.random() * window.innerHeight + "px";

  document.body.appendChild(d);

  setTimeout(() => d.remove(), 4000);
}, 300);
</script>

</body>
</html>
