<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WEIRD WEB WORLD</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    overflow: hidden;
    color: white;
    transition: 0.2s;
  }

  #coreText {
    position: absolute;
    top: 45%;
    width: 100%;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
  }

  .btn {
    position: absolute;
    padding: 10px 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: white;
  }

  .popup {
    position: absolute;
    padding: 10px;
    background: red;
    color: white;
    font-size: 14px;
  }

  .glitch {
    animation: glitch 0.2s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(0,0); }
    25% { transform: translate(3px,-2px); }
    50% { transform: translate(-3px,2px); }
    75% { transform: translate(2px,2px); }
    100% { transform: translate(0,0); }
  }
</style>
</head>

<body>

<div id="coreText">DO NOT TRUST THE WEBSITE</div>

<button class="btn" onclick="chaos()">CLICK ME</button>

<script>
const texts = [
  "WHY DID YOU CLICK THAT",
  "SYSTEM IS SHIFTING",
  "HELLO???",
  "THE PAGE IS ALIVE",
  "YOU CAN'T LEAVE",
  "REALITY ERROR"
];

function chaos() {
  // random background
  document.body.style.background =
    `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;

  // change text
  document.getElementById("coreText").innerText =
    texts[Math.floor(Math.random()*texts.length)];

  // glitch toggle
  document.body.classList.toggle("glitch");

  // spawn popup
  spawnPopup();

  // move button
  moveButton();
}

function moveButton() {
  const btn = document.querySelector("button");
  btn.style.left = Math.random() * window.innerWidth + "px";
  btn.style.top = Math.random() * window.innerHeight + "px";
}

function spawnPopup() {
  const div = document.createElement("div");
  div.className = "popup";
  div.innerText = "SYSTEM WARNING";

  div.style.left = Math.random() * window.innerWidth + "px";
  div.style.top = Math.random() * window.innerHeight + "px";

  document.body.appendChild(div);

  setTimeout(() => div.remove(), 2000);
}

// constant chaos
setInterval(() => {
  document.body.style.transform =
    `rotate(${(Math.random()-0.5)*2}deg)`;
}, 500);
</script>

</body>
</html>
