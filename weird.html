<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WEIRD MODE</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
  }

  #centerText {
    position: absolute;
    top: 45%;
    width: 100%;
    text-align: center;
    font-size: 30px;
    z-index: 10;
    pointer-events: none;
  }

  .box {
    position: absolute;
    width: 60px;
    height: 60px;
    opacity: 0.8;
  }

  .popup {
    position: absolute;
    background: yellow;
    color: black;
    padding: 5px;
    font-size: 12px;
    font-weight: bold;
  }
</style>
</head>

<body>

<div id="centerText">SYSTEM STABILITY: UNKNOWN</div>

<script>
const messages = [
  "ERROR ERROR ERROR",
  "SYSTEM OVERLOAD",
  "REALITY UNSTABLE",
  "WHY IS THIS HAPPENING",
  "TOO MANY PROCESSES",
  "HELLO USER"
];

// TEXT CHAOS
setInterval(() => {
  document.getElementById("centerText").innerText =
    messages[Math.floor(Math.random() * messages.length)];
}, 400);

// BACKGROUND FLASH
setInterval(() => {
  document.body.style.background =
    `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
}, 150);

// SPAWN BOXES (ALWAYS MOVING)
setInterval(() => {
  const box = document.createElement("div");
  box.className = "box";

  box.style.left = Math.random() * window.innerWidth + "px";
  box.style.top = Math.random() * window.innerHeight + "px";
  box.style.background = `hsl(${Math.random()*360},100%,50%)`;

  document.body.appendChild(box);

  setInterval(() => {
    box.style.left = Math.random() * window.innerWidth + "px";
    box.style.top = Math.random() * window.innerHeight + "px";
  }, 250);

  setTimeout(() => box.remove(), 8000);
}, 120);

// POPUPS EVERYWHERE
setInterval(() => {
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = "SYSTEM ALERT";

  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.top = Math.random() * window.innerHeight + "px";

  document.body.appendChild(p);

  setTimeout(() => p.remove(), 1500);
}, 250);

// SCREEN SHAKE
setInterval(() => {
  const x = (Math.random() - 0.5) * 30;
  const y = (Math.random() - 0.5) * 30;
  document.body.style.transform = `translate(${x}px, ${y}px)`;
}, 80);

// ROTATION DRIFT
setInterval(() => {
  document.body.style.transform += ` rotate(${(Math.random()-0.5)*2}deg)`;
}, 600);
</script>

</body>
</html>
